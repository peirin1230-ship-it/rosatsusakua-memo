<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ロサTス作ア メモ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* ===== Theme Variables ===== */
    :root {
      --bg-primary: #1a1a1e;
      --bg-secondary: #222;
      --bg-card: #1e1e22;
      --bg-card-active: #222228;
      --bg-header: linear-gradient(135deg, #1a1a1e 0%, #2a2a30 100%);
      --bg-input: #222;
      --bg-btn: #333;
      --bg-btn-hover: #444;
      --bg-overlay: rgba(0,0,0,0.6);
      --bg-modal: #222228;
      --bg-tip: #2a2520;
      --bg-warning: #1c1416;
      --bg-checklist: #161820;
      --bg-export-menu: #2a2a30;
      --text-primary: #e8e6e3;
      --text-secondary: #ccc;
      --text-muted: #888;
      --text-faint: #666;
      --text-very-faint: #555;
      --text-hint: #999;
      --border-primary: #333;
      --border-secondary: #444;
      --border-tertiary: #555;
      --border-input: #3a3a3a;
      --border-tip: #4a3a20;
      --border-warning: #3a2028;
      --border-checklist: #252840;
      --progress-bg: #333;
      --flow-arrow: #444;
      --flow-circle-bg: #222;
      --flow-circle-filled: #2a2a30;
      --tree-line: #444;
      --tree-sub-line: #333;
      --shadow-glow: 0.1;
      --tip-color: #c8a860;
      --tip-close: #886830;
      --ai-bg: #1a2030;
      --ai-border: #2a3a5a;
      --ai-color: #7B9ED9;
      --ai-bg-hover: #2a3040;
      --ai-copied-bg: #1a3020;
      --ai-copied-border: #2a5a3a;
      --btn-new-bg: #2a3a2a;
      --btn-new-border: #3a5a3a;
      --btn-new-color: #6c6;
      --btn-new-hover: #3a4a3a;
      --btn-del-bg: #3a2a2a;
      --btn-del-border: #5a3a3a;
      --btn-del-color: #c66;
      --btn-del-hover: #4a3a3a;
    }

    [data-theme="light"] {
      --bg-primary: #f5f5f7;
      --bg-secondary: #fff;
      --bg-card: #fff;
      --bg-card-active: #fafafa;
      --bg-header: linear-gradient(135deg, #f5f5f7 0%, #eaeaee 100%);
      --bg-input: #fff;
      --bg-btn: #e8e8ec;
      --bg-btn-hover: #dddde2;
      --bg-overlay: rgba(0,0,0,0.3);
      --bg-modal: #fff;
      --bg-tip: #fff8e8;
      --bg-warning: #fff5f5;
      --bg-checklist: #f5f5ff;
      --bg-export-menu: #fff;
      --text-primary: #1a1a2e;
      --text-secondary: #333;
      --text-muted: #666;
      --text-faint: #888;
      --text-very-faint: #aaa;
      --text-hint: #777;
      --border-primary: #ddd;
      --border-secondary: #ccc;
      --border-tertiary: #bbb;
      --border-input: #ccc;
      --border-tip: #e0c880;
      --border-warning: #e8a0a0;
      --border-checklist: #d0d0e8;
      --progress-bg: #ddd;
      --flow-arrow: #aaa;
      --flow-circle-bg: #fff;
      --flow-circle-filled: #f0f0f4;
      --tree-line: #bbb;
      --tree-sub-line: #ccc;
      --shadow-glow: 0.15;
      --tip-color: #8a6a20;
      --tip-close: #a08040;
      --ai-bg: #eef3ff;
      --ai-border: #b0c4e8;
      --ai-color: #4a70b0;
      --ai-bg-hover: #dde8ff;
      --ai-copied-bg: #e8f5e8;
      --ai-copied-border: #80c080;
      --btn-new-bg: #e8f5e8;
      --btn-new-border: #a0d0a0;
      --btn-new-color: #2a7a2a;
      --btn-new-hover: #d8ecd8;
      --btn-del-bg: #fde8e8;
      --btn-del-border: #e0a0a0;
      --btn-del-color: #c44;
      --btn-del-hover: #f5d8d8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Noto Sans JP', 'Helvetica Neue', sans-serif; transition: background 0.3s, color 0.3s; }
    .mono { font-family: 'IBM Plex Mono', monospace; }

    /* Header */
    .header {
      background: var(--bg-header);
      border-bottom: 1px solid var(--border-primary);
      padding: 20px 24px 16px;
      position: sticky; top: 0; z-index: 10;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .header-subtitle { font-size: 13px; font-weight: 400; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }
    .header-title { font-size: 28px; font-weight: 900; margin-top: 4px; letter-spacing: 6px; display: flex; gap: 2px; }
    .btn { background: var(--bg-btn); border: 1px solid var(--border-tertiary); color: var(--text-secondary); padding: 6px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; transition: background 0.2s; }
    .btn:hover { background: var(--bg-btn-hover); }
    .btn-muted { color: var(--text-muted); }
    .btn-new { background: var(--btn-new-bg); border: 1px solid var(--btn-new-border); color: var(--btn-new-color); }
    .btn-new:hover { background: var(--btn-new-hover); }
    .btn-delete { background: var(--btn-del-bg); border: 1px solid var(--btn-del-border); color: var(--btn-del-color); }
    .btn-delete:hover { background: var(--btn-del-hover); }
    .btn-theme { background: var(--bg-btn); border: 1px solid var(--border-secondary); color: var(--text-muted); padding: 6px 10px; border-radius: 6px; font-size: 14px; cursor: pointer; transition: background 0.2s; line-height: 1; }
    .btn-theme:hover { background: var(--bg-btn-hover); }
    .project-input {
      width: 100%; background: var(--bg-input); border: 1px solid var(--border-input); border-radius: 6px;
      padding: 8px 12px; color: var(--text-primary); font-size: 14px; font-family: 'Noto Sans JP', sans-serif;
      outline: none; box-sizing: border-box; margin-bottom: 10px; transition: background 0.3s, color 0.3s, border-color 0.3s;
    }
    .progress-bar { flex: 1; height: 3px; background: var(--progress-bg); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease;
      background: linear-gradient(90deg, #E8443A, #E07B2E, #D4A72C, #3BA55D, #4A90D9, #7B68EE);
    }

    /* Project bar */
    .project-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .project-select {
      flex: 1; background: var(--bg-input); border: 1px solid var(--border-input); border-radius: 6px;
      padding: 6px 10px; color: var(--text-primary); font-size: 13px;
      font-family: 'Noto Sans JP', sans-serif; outline: none; transition: background 0.3s, color 0.3s;
    }

    /* Tip */
    .tip-banner {
      margin: 16px 16px 0; padding: 12px 16px; background: var(--bg-tip); border: 1px solid var(--border-tip);
      border-radius: 8px; font-size: 12px; color: var(--tip-color); display: flex;
      justify-content: space-between; align-items: flex-start; line-height: 1.6;
    }
    .tip-close { background: none; border: none; color: var(--tip-close); cursor: pointer; font-size: 16px; padding: 0 0 0 12px; line-height: 1; }

    /* Flow */
    .flow-row { display: flex; justify-content: center; align-items: center; padding: 20px 16px 8px; gap: 4px; flex-wrap: wrap; }
    .flow-circle {
      width: 40px; height: 40px; border-radius: 50%; font-size: 16px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: all 0.2s ease; position: relative; border: 2px solid var(--border-secondary); background: var(--flow-circle-bg); color: var(--text-faint);
      font-family: 'Noto Sans JP', sans-serif;
    }
    .flow-circle .dot {
      position: absolute; top: -2px; right: -2px; width: 10px; height: 10px; border-radius: 50%;
    }
    .flow-d {
      width: 40px; height: 40px; border-radius: 50%; border: 2px dashed var(--border-tertiary); background: var(--flow-circle-bg);
      color: var(--text-faint); font-size: 16px; font-weight: 700; display: flex; align-items: center;
      justify-content: center; font-family: 'Noto Sans JP', sans-serif;
    }
    .flow-hint { text-align: center; font-size: 10px; color: var(--text-very-faint); margin-bottom: 8px; }

    /* View mode toggle */
    .view-toggle-bar { display: flex; justify-content: center; gap: 4px; margin-bottom: 12px; }
    .view-btn {
      background: var(--bg-secondary); border: 1px solid var(--border-secondary); color: var(--text-muted); padding: 4px 12px;
      border-radius: 6px; font-size: 11px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; transition: background 0.2s;
    }
    .view-btn.active { background: var(--bg-btn); border-color: var(--border-tertiary); color: var(--text-primary); }

    /* Cards */
    .cards { padding: 8px 16px 100px; }
    .card { margin-bottom: 8px; border-radius: 10px; border: 1px solid var(--border-primary); background: var(--bg-card); overflow: hidden; transition: all 0.3s ease; }
    .card.active { background: var(--bg-card-active); }
    .card-header {
      width: 100%; display: flex; align-items: center; gap: 12px; padding: 14px 16px;
      background: none; border: none; cursor: pointer; text-align: left; color: var(--text-primary);
    }
    .card-key { font-size: 20px; font-weight: 900; min-width: 28px; font-family: 'Noto Sans JP', sans-serif; }
    .card-label { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .card-question { font-size: 11px; color: var(--text-hint); margin-top: 2px; }
    .card-chevron { color: var(--text-very-faint); font-size: 16px; transition: transform 0.2s ease; }
    .card-chevron.open { transform: rotate(180deg); }
    .card-body { padding: 0 16px 16px; }
    .card-hint { padding: 10px 12px; border-radius: 6px; margin-bottom: 10px; }
    .card-hint-text { font-size: 12px; color: var(--text-hint); white-space: pre-line; line-height: 1.6; }
    .card-hint-example { font-size: 11px; margin-top: 6px; opacity: 0.7; }
    .card-textarea {
      width: 100%; min-height: 100px; background: var(--bg-primary); border-radius: 6px;
      padding: 12px; color: var(--text-primary); font-size: 13px; font-family: 'Noto Sans JP', sans-serif;
      line-height: 1.8; outline: none; resize: vertical; box-sizing: border-box; transition: background 0.3s, color 0.3s;
    }
    .card-nav { display: flex; justify-content: space-between; margin-top: 8px; }
    .nav-btn {
      background: none; padding: 6px 14px; border-radius: 6px; font-size: 11px; cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
    }
    .nav-btn-prev { border: 1px solid var(--border-secondary); color: var(--text-muted); }
    .filled-dot { width: 6px; height: 6px; border-radius: 50%; }

    /* AI button */
    .ai-btn {
      background: var(--ai-bg); border: 1px solid var(--ai-border); color: var(--ai-color); padding: 8px 14px;
      border-radius: 6px; font-size: 12px; cursor: pointer; margin-top: 8px; width: 100%;
      font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s;
    }
    .ai-btn:hover { background: var(--ai-bg-hover); }
    .ai-btn.copied { background: var(--ai-copied-bg); border-color: var(--ai-copied-border); color: var(--btn-new-color); }

    /* Overview grid */
    .overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px 16px 100px; }
    @media (max-width: 640px) { .overview-grid { grid-template-columns: 1fr; } }
    .overview-card {
      background: var(--bg-card); border: 1px solid var(--border-primary); border-radius: 8px;
      padding: 12px; display: flex; flex-direction: column; gap: 8px;
    }
    .overview-header { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; }

    /* Tree view */
    .tree-container { padding: 16px 24px 100px; }
    .tree-root-label {
      font-size: 15px; font-weight: 700; padding: 8px 12px; border-radius: 6px;
      margin-bottom: 12px; cursor: pointer;
    }
    .tree-branch { padding-left: 24px; position: relative; }
    .tree-branch::before {
      content: ""; position: absolute; left: 10px; top: 0; bottom: 12px;
      border-left: 1px dashed var(--tree-line);
    }
    .tree-node { position: relative; padding: 6px 0 6px 20px; }
    .tree-node::before {
      content: ""; position: absolute; left: -14px; top: 18px;
      width: 14px; border-top: 1px dashed var(--tree-line);
    }
    .tree-node-label {
      font-size: 13px; padding: 4px 10px; border-radius: 4px; cursor: pointer;
      display: inline-block; transition: background 0.2s;
    }
    .tree-node-label:hover { filter: brightness(1.1); }
    .tree-sub-branch { padding-left: 24px; position: relative; }
    .tree-sub-branch::before {
      content: ""; position: absolute; left: 10px; top: 0; bottom: 12px;
      border-left: 1px dashed var(--tree-sub-line);
    }
    .tree-empty { color: var(--text-very-faint); font-size: 12px; font-style: italic; padding: 8px 0 8px 24px; }

    /* Warning */
    .warning-card { margin-top: 16px; padding: 16px; background: var(--bg-warning); border: 1px solid var(--border-warning); border-radius: 10px; }
    .warning-title { font-size: 13px; font-weight: 700; color: #E8443A; margin-bottom: 8px; }
    .warning-body { font-size: 12px; color: var(--text-hint); line-height: 1.8; }

    /* Checklist */
    .checklist-card { margin-top: 12px; padding: 16px; background: var(--bg-checklist); border: 1px solid var(--border-checklist); border-radius: 10px; }
    .checklist-title { font-size: 13px; font-weight: 700; color: #7B68EE; margin-bottom: 10px; }
    .checklist-item {
      font-size: 12px; color: var(--text-muted); padding: 6px 0; line-height: 1.6;
      cursor: pointer; user-select: none; transition: opacity 0.2s;
    }
    .checklist-item:hover { opacity: 0.8; }
    .checklist-item:not(:last-child) { border-bottom: 1px solid var(--border-checklist); }
    .checklist-box { margin-right: 8px; }

    /* Export menu */
    .export-menu-wrapper { position: relative; display: inline-block; }
    .export-menu {
      position: absolute; top: 100%; left: 0; margin-top: 4px;
      background: var(--bg-export-menu); border: 1px solid var(--border-secondary); border-radius: 6px;
      overflow: hidden; z-index: 20; min-width: 160px;
    }
    .export-menu button {
      display: block; width: 100%; background: none; border: none; color: var(--text-secondary);
      padding: 8px 12px; font-size: 12px; cursor: pointer; text-align: left;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .export-menu button:hover { background: var(--bg-btn); }

    /* Template modal */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg-overlay); z-index: 100; display: flex;
      align-items: center; justify-content: center; padding: 16px;
    }
    .modal {
      background: var(--bg-modal); border: 1px solid var(--border-secondary); border-radius: 12px;
      padding: 24px; max-width: 400px; width: 100%;
    }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .template-btn {
      display: block; width: 100%; background: var(--bg-card); border: 1px solid var(--border-primary);
      color: var(--text-primary); padding: 12px 16px; border-radius: 8px; margin-bottom: 8px;
      cursor: pointer; text-align: left; font-family: 'Noto Sans JP', sans-serif;
      transition: border-color 0.2s;
    }
    .template-btn:hover { border-color: var(--border-tertiary); }
    .template-btn-name { font-size: 14px; font-weight: 500; }
    .template-btn-desc { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* Timestamp */
    .timestamp { font-size: 10px; color: var(--text-very-faint); text-align: right; margin-top: 4px; font-family: 'IBM Plex Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const STEPS = [
      { key: "ロ", label: "論点", color: "#E8443A",
        hint: "そもそも何を答えるべき？\n「〜すべきか？」の形で書く",
        example: "例：新規事業Xに参入すべきか？",
        question: "この仕事のBIG QUESTIONは？" },
      { key: "サ", label: "サブ論点", color: "#E07B2E",
        hint: "論点を解くための「問い」に分解\n3〜5個がベスト",
        example: "例：市場規模は？/勝てるか？/儲かるか？",
        question: "論点の答えを出すには、何を検討すべき？" },
      { key: "T", label: "TASK", color: "#D4A72C",
        hint: "各サブ論点に答えるための\n具体的な作業を設計",
        example: "例：市場規模→業界レポート分析＋ヒアリング3件",
        question: "サブ論点に答えるために、何をやる？" },
      { key: "ス", label: "スケジュール", color: "#3BA55D",
        hint: "TASKの優先度・順番・期限を\n決めてWBSに落とす",
        example: "例：Day1-3 リサーチ → Day4-5 分析 → Day6 資料化",
        question: "いつまでに、誰が、どの順で？" },
      { key: "作", label: "作業", color: "#4A90D9",
        hint: "手を動かすフェーズ\nでも常に論点に立ち返る",
        example: "例：Excelで数値分析 → Wordで示唆まとめ",
        question: "ちゃんと論点に答える作業してる？" },
      { key: "ア", label: "アウトプット", color: "#7B68EE",
        hint: "最終成果物\n→ そのあと必ずD（議論）へ",
        example: "例：提案スライド10枚 → 上司とディスカッション",
        question: "論点にストレートに答えてる？" },
    ];

    const CHECKLIST = [
      "論点は「〜すべきか？」の形になってる？",
      "サブ論点は論点の「答え」を作れる問いになってる？",
      "TASKはサブ論点に紐づいてる？宙ぶらりんのTASKない？",
      "アウトプットは論点にストレートに答えてる？",
      "最後にD（ディスカッション）ちゃんとやった？",
    ];

    const TEMPLATES = [
      {
        name: "新規事業検討",
        desc: "参入判断のための論点・サブ論点・TASKをセット",
        notes: {
          "ロ": "新規事業Xに参入すべきか？",
          "サ": "市場規模は十分か？\n自社の強みを活かせるか？\n収益性は確保できるか？\nリスクは許容範囲か？",
          "T": "業界レポート分析\n競合3社のベンチマーク\n事業計画シミュレーション\nリスク洗い出しと対策案",
          "ス": "", "作": "", "ア": "",
        },
      },
      {
        name: "業務改善提案",
        desc: "現状の問題を分析し改善策を提案する",
        notes: {
          "ロ": "○○プロセスを改善すべきか？",
          "サ": "現状の問題点は何か？\n改善によるインパクトはどの程度か？\n実現可能性は？\nコストは見合うか？",
          "T": "現状フローの可視化\n関係者ヒアリング3名\n改善案の設計\nコスト試算",
          "ス": "", "作": "", "ア": "",
        },
      },
      {
        name: "問題解決",
        desc: "発生した問題の原因特定と解決策を検討",
        notes: {
          "ロ": "○○問題をどう解決すべきか？",
          "サ": "根本原因は何か？\n影響範囲はどこまでか？\nどの解決策が最も効果的か？",
          "T": "事象の時系列整理\n関係者からの情報収集\n原因の仮説立て→検証\n解決策の比較検討",
          "ス": "", "作": "", "ア": "",
        },
      },
      {
        name: "白紙（空のプロジェクト）",
        desc: "何も入っていない状態から始める",
        notes: {},
      },
    ];

    const AI_PROMPTS = {
      "ロ": "現在「論点」のステップにいます。\nこの論点が適切か、もっと鋭くできないか、一緒に考えてください。\n論点は「〜すべきか？」の形にするのが基本です。",
      "サ": "現在「サブ論点」のステップにいます。\nこの論点を解くためのサブ論点が適切か、漏れがないか確認してください。\nMECEを意識して3〜5個に分解したいです。",
      "T": "現在「TASK」のステップにいます。\n各サブ論点に答えるためのTASKが適切か、もっと効率的な方法がないか提案してください。",
      "ス": "現在「スケジュール」のステップにいます。\nTASKの優先順位とスケジュールの組み方について相談したいです。",
      "作": "現在「作業」のステップにいます。\n作業が論点にちゃんと答えるものになっているか、ズレていないかチェックしてください。",
      "ア": "現在「アウトプット」のステップにいます。\nこのアウトプットが論点にストレートに答えているか確認してください。\nディスカッション（D）の準備として何を意識すべきかも教えてください。",
    };

    const generateId = () => {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    };

    const parseLines = (text) => {
      if (!text) return [];
      return text.split("\n").map(l => l.replace(/^[\s・\-\*・●◯◆■□▪▸▹►▻→]+/, "").trim()).filter(Boolean);
    };

    const parseImportText = (text) => {
      const lines = text.split("\n");
      let name = "";
      const notes = {};
      let currentKey = null;
      let currentLines = [];
      for (const line of lines) {
        if (line.startsWith("# ") && !line.includes("ロ→サ") && !name) { name = line.slice(2).trim(); continue; }
        const match = line.match(/^## \[(.)\] /);
        if (match) {
          if (currentKey) notes[currentKey] = currentLines.join("\n").trim();
          currentKey = match[1]; currentLines = []; continue;
        }
        if (line === "---" || line.startsWith("# ロ→サ") || line.startsWith("> ロ→サ")) continue;
        const mdMatch = line.match(/^## (.) /);
        if (mdMatch && STEPS.some(s => s.key === mdMatch[1])) {
          if (currentKey) notes[currentKey] = currentLines.join("\n").trim();
          currentKey = mdMatch[1]; currentLines = []; continue;
        }
        if (currentKey) currentLines.push(line);
      }
      if (currentKey) notes[currentKey] = currentLines.join("\n").trim();
      for (const k of Object.keys(notes)) {
        if (notes[k] === "（未記入）" || notes[k] === "*未記入*") notes[k] = "";
      }
      return { name, notes };
    };

    function App() {
      // --- Data state (persisted) ---
      const [projects, setProjects] = useState(() => {
        try { const s = localStorage.getItem("rosatsusakua-projects"); return s ? JSON.parse(s) : {}; }
        catch { return {}; }
      });
      const [currentProjectId, setCurrentProjectId] = useState(() => {
        try { return localStorage.getItem("rosatsusakua-current") || null; }
        catch { return null; }
      });
      const [theme, setTheme] = useState(() => {
        try { return localStorage.getItem("rosatsusakua-theme") || "dark"; }
        catch { return "dark"; }
      });

      // --- UI state ---
      const [activeStep, setActiveStep] = useState(null);
      const [showTip, setShowTip] = useState(true);
      const [viewMode, setViewMode] = useState("single");
      const [showExportMenu, setShowExportMenu] = useState(false);
      const [showTemplateModal, setShowTemplateModal] = useState(false);
      const [copiedStep, setCopiedStep] = useState(null);

      // --- Persist ---
      useEffect(() => {
        try { localStorage.setItem("rosatsusakua-projects", JSON.stringify(projects)); } catch {}
      }, [projects]);
      useEffect(() => {
        try {
          if (currentProjectId) localStorage.setItem("rosatsusakua-current", currentProjectId);
          else localStorage.removeItem("rosatsusakua-current");
        } catch {}
      }, [currentProjectId]);
      useEffect(() => {
        document.documentElement.setAttribute("data-theme", theme);
        try { localStorage.setItem("rosatsusakua-theme", theme); } catch {}
      }, [theme]);

      // --- Init: create first project if empty ---
      useEffect(() => {
        if (Object.keys(projects).length === 0) {
          const id = generateId();
          const now = new Date().toISOString();
          setProjects({ [id]: { id, name: "", notes: {}, checklist: {}, createdAt: now, updatedAt: now } });
          setCurrentProjectId(id);
        } else if (!currentProjectId || !projects[currentProjectId]) {
          setCurrentProjectId(Object.keys(projects)[0]);
        }
      }, []);

      // --- Derived values ---
      const currentProject = currentProjectId ? projects[currentProjectId] : null;
      const notes = currentProject?.notes || {};
      const projectName = currentProject?.name || "";
      const checklist = currentProject?.checklist || {};
      const filledCount = Object.values(notes).filter(v => v && v.trim()).length;
      const progress = (filledCount / 6) * 100;
      const projectList = Object.values(projects).sort((a, b) => (b.updatedAt || "").localeCompare(a.updatedAt || ""));

      // --- Theme ---
      const toggleTheme = () => setTheme(prev => prev === "dark" ? "light" : "dark");

      // --- Project management ---
      const createProjectFromTemplate = (template) => {
        const id = generateId();
        const now = new Date().toISOString();
        setProjects(prev => ({
          ...prev,
          [id]: { id, name: template.name === "白紙（空のプロジェクト）" ? "" : template.name, notes: { ...template.notes }, checklist: {}, createdAt: now, updatedAt: now },
        }));
        setCurrentProjectId(id);
        setActiveStep(null);
        setShowTemplateModal(false);
      };

      const switchProject = (id) => { setCurrentProjectId(id); setActiveStep(null); };

      const deleteProject = () => {
        if (!currentProjectId) return;
        if (!confirm("このプロジェクトを削除しますか？")) return;
        const next = { ...projects };
        delete next[currentProjectId];
        setProjects(next);
        const remaining = Object.keys(next);
        if (remaining.length > 0) { setCurrentProjectId(remaining[0]); }
        else { setCurrentProjectId(null); }
        setActiveStep(null);
      };

      // --- Data updaters ---
      const updateNotes = (key, value) => {
        if (!currentProjectId) return;
        setProjects(prev => ({
          ...prev,
          [currentProjectId]: { ...prev[currentProjectId], notes: { ...prev[currentProjectId].notes, [key]: value }, updatedAt: new Date().toISOString() },
        }));
      };
      const updateProjectName = (name) => {
        if (!currentProjectId) return;
        setProjects(prev => ({
          ...prev,
          [currentProjectId]: { ...prev[currentProjectId], name, updatedAt: new Date().toISOString() },
        }));
      };
      const toggleChecklist = (index) => {
        if (!currentProjectId) return;
        setProjects(prev => ({
          ...prev,
          [currentProjectId]: {
            ...prev[currentProjectId],
            checklist: { ...prev[currentProjectId].checklist, [index]: !prev[currentProjectId].checklist?.[index] },
            updatedAt: new Date().toISOString(),
          },
        }));
      };

      // --- Export ---
      const handleExport = (format) => {
        setShowExportMenu(false);
        const pName = projectName || "無題のプロジェクト";
        let text, filename;
        if (format === "md") {
          text = `# ${pName}\n\n> ロ→サ→T→ス→作→ア フレームワーク\n\n---\n\n`;
          STEPS.forEach(s => {
            text += `## ${s.key} ${s.label}\n\n`;
            const c = notes[s.key]?.trim();
            text += c ? `${c}\n\n` : `*未記入*\n\n`;
          });
          text += `---\n\n## セルフチェック\n\n`;
          CHECKLIST.forEach((q, i) => { text += `- [${checklist[i] ? "x" : " "}] ${q}\n`; });
          text += `\n---\n*最終更新: ${new Date().toLocaleString("ja-JP")}*\n`;
          filename = `${pName}-memo.md`;
        } else {
          text = `# ${pName}\n# ロ→サ→T→ス→作→ア メモ\n---\n\n`;
          STEPS.forEach(s => { text += `## [${s.key}] ${s.label}\n${notes[s.key] || "（未記入）"}\n\n`; });
          filename = `${pName}-memo.txt`;
        }
        const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = url; a.download = filename; a.click();
        URL.revokeObjectURL(url);
      };

      // --- Import ---
      const handleImport = () => {
        const input = document.createElement("input");
        input.type = "file"; input.accept = ".txt,.md";
        input.onchange = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            const parsed = parseImportText(ev.target.result);
            const id = generateId();
            const now = new Date().toISOString();
            setProjects(prev => ({
              ...prev,
              [id]: { id, name: parsed.name || file.name.replace(/\.[^.]+$/, ""), notes: parsed.notes, checklist: {}, createdAt: now, updatedAt: now },
            }));
            setCurrentProjectId(id);
            setActiveStep(null);
          };
          reader.readAsText(file, "UTF-8");
        };
        input.click();
      };

      // --- Reset ---
      const handleReset = () => {
        if (!currentProjectId) return;
        if (!confirm("このプロジェクトのメモを全てクリアしますか？")) return;
        setProjects(prev => ({
          ...prev,
          [currentProjectId]: { ...prev[currentProjectId], notes: {}, checklist: {}, updatedAt: new Date().toISOString() },
        }));
        setActiveStep(null);
      };

      // --- AI prompt ---
      const generateAIPrompt = (stepKey) => {
        const pName = projectName || "無題のプロジェクト";
        let prompt = `あなたは高松智史氏の仕事術「ロサTス作ア」フレームワークの専門家です。\n\n`;
        prompt += `【プロジェクト】${pName}\n\n`;
        prompt += `【現在のメモ内容】\n`;
        STEPS.forEach(s => { prompt += `[${s.key}] ${s.label}: ${notes[s.key]?.trim() || "（未記入）"}\n`; });
        prompt += `\n【相談したいこと】\n${AI_PROMPTS[stepKey]}`;
        return prompt;
      };

      const handleAICopy = async (stepKey) => {
        const prompt = generateAIPrompt(stepKey);
        try {
          await navigator.clipboard.writeText(prompt);
          setCopiedStep(stepKey);
          setTimeout(() => setCopiedStep(null), 2500);
        } catch {
          const ta = document.createElement("textarea");
          ta.value = prompt; document.body.appendChild(ta); ta.select(); document.execCommand("copy");
          document.body.removeChild(ta);
          setCopiedStep(stepKey);
          setTimeout(() => setCopiedStep(null), 2500);
        }
      };

      // --- Tree view helpers ---
      const buildTree = () => {
        const ronten = notes["ロ"]?.trim() || "";
        const subLines = parseLines(notes["サ"]);
        const taskLines = parseLines(notes["T"]);
        const schedLines = parseLines(notes["ス"]);
        return { ronten, subLines, taskLines, schedLines };
      };

      // ===== RENDER =====
      return (
        <div>
          {/* Header */}
          <div className="header">
            <div className="header-top">
              <div>
                <div className="header-subtitle mono">高松智史式</div>
                <div className="header-title">
                  {STEPS.map(s => (
                    <span key={s.key} style={{ color: s.color, textShadow: `0 0 20px ${s.color}33` }}>{s.key}</span>
                  ))}
                </div>
              </div>
              <div style={{ display: "flex", gap: "6px", flexWrap: "wrap", alignItems: "center" }}>
                <button className="btn-theme" onClick={toggleTheme} title={theme === "dark" ? "ライトモードに切替" : "ダークモードに切替"}>
                  {theme === "dark" ? "☀️" : "🌙"}
                </button>
                <button className="btn" onClick={handleImport}>📥 Import</button>
                <div className="export-menu-wrapper">
                  <button className="btn" onClick={() => setShowExportMenu(!showExportMenu)}>📋 Export ▾</button>
                  {showExportMenu && (
                    <div className="export-menu">
                      <button onClick={() => handleExport("txt")}>📄 テキスト (.txt)</button>
                      <button onClick={() => handleExport("md")}>📝 Markdown (.md)</button>
                    </div>
                  )}
                </div>
                <button className="btn btn-muted" onClick={handleReset}>↺ Reset</button>
              </div>
            </div>

            {/* Project bar */}
            <div className="project-bar">
              <button className="btn btn-new" onClick={() => setShowTemplateModal(true)}>+ 新規</button>
              <select className="project-select" value={currentProjectId || ""}
                onChange={e => switchProject(e.target.value)}>
                {projectList.map(p => (
                  <option key={p.id} value={p.id}>{p.name || "無題のプロジェクト"}</option>
                ))}
              </select>
              <button className="btn btn-delete" onClick={deleteProject}>🗑</button>
            </div>

            <input className="project-input" value={projectName}
              onChange={e => updateProjectName(e.target.value)} placeholder="プロジェクト名をメモ..." />

            <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
              <div className="progress-bar">
                <div className="progress-fill" style={{ width: `${progress}%` }} />
              </div>
              <span className="mono" style={{ fontSize: "11px", color: "var(--text-faint)", whiteSpace: "nowrap" }}>{filledCount}/6</span>
            </div>

            {currentProject?.updatedAt && (
              <div className="timestamp">最終更新: {new Date(currentProject.updatedAt).toLocaleString("ja-JP")}</div>
            )}
          </div>

          {/* Tip */}
          {showTip && (
            <div className="tip-banner">
              <div>
                <strong>💡 核心：</strong>いきなりTASKに飛ばない。
                <br />「ロ→サ」= 論点とサブ論点を先に立てるだけで、仕事の質が激変する。
                <br />最後は必ず<strong> →D（ディスカッション）</strong>で上司と議論してプロセスを閉じる。
              </div>
              <button className="tip-close" onClick={() => setShowTip(false)}>✕</button>
            </div>
          )}

          {/* Flow */}
          <div className="flow-row">
            {STEPS.map((s, i) => (
              <div key={s.key} style={{ display: "flex", alignItems: "center", gap: "4px" }}>
                <button className="flow-circle"
                  onClick={() => { setActiveStep(activeStep === s.key ? null : s.key); setViewMode("single"); }}
                  style={{
                    borderColor: activeStep === s.key ? s.color : (notes[s.key]?.trim() ? s.color + "88" : undefined),
                    background: activeStep === s.key ? `${s.color}22` : (notes[s.key]?.trim() ? "var(--flow-circle-filled)" : undefined),
                    color: notes[s.key]?.trim() ? s.color : (activeStep === s.key ? s.color : undefined),
                    boxShadow: activeStep === s.key ? `0 0 16px ${s.color}33` : "none",
                  }}>
                  {s.key}
                  {notes[s.key]?.trim() && <span className="dot" style={{ background: s.color }} />}
                </button>
                {i < STEPS.length - 1 && <span className="mono" style={{ color: "var(--flow-arrow)", fontSize: "14px" }}>→</span>}
              </div>
            ))}
            <span className="mono" style={{ color: "var(--flow-arrow)", fontSize: "14px", marginLeft: "4px" }}>→</span>
            <div className="flow-d">D</div>
          </div>
          <div className="flow-hint mono">タップして展開 → メモを記入</div>

          {/* View mode toggle */}
          <div className="view-toggle-bar">
            {[["single", "個別"], ["overview", "一覧"], ["tree", "ツリー"]].map(([mode, label]) => (
              <button key={mode} className={`view-btn${viewMode === mode ? " active" : ""}`}
                onClick={() => setViewMode(mode)}>{label}</button>
            ))}
          </div>

          {/* ===== SINGLE MODE ===== */}
          {viewMode === "single" && (
            <div className="cards">
              {STEPS.map((s, i) => {
                const isActive = activeStep === s.key;
                const hasContent = notes[s.key]?.trim();
                return (
                  <div key={s.key} className={`card${isActive ? " active" : ""}`}
                    style={{ borderColor: isActive ? s.color + "66" : undefined,
                      boxShadow: isActive ? `0 4px 24px ${s.color}11` : "none" }}>
                    <button className="card-header" onClick={() => setActiveStep(isActive ? null : s.key)}>
                      <div className="card-key" style={{ color: s.color,
                        textShadow: isActive ? `0 0 12px ${s.color}44` : "none" }}>{s.key}</div>
                      <div style={{ flex: 1 }}>
                        <div className="card-label">{s.label}</div>
                        <div className="card-question">{s.question}</div>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                        {hasContent && <div className="filled-dot" style={{ background: s.color }} />}
                        <span className={`card-chevron${isActive ? " open" : ""}`}>▾</span>
                      </div>
                    </button>

                    {isActive && (
                      <div className="card-body">
                        <div className="card-hint" style={{ background: `${s.color}0a`, border: `1px solid ${s.color}22` }}>
                          <div className="card-hint-text">{s.hint}</div>
                          <div className="card-hint-example mono" style={{ color: s.color }}>{s.example}</div>
                        </div>
                        <textarea className="card-textarea" style={{ border: `1px solid ${s.color}33` }}
                          value={notes[s.key] || ""} onChange={e => updateNotes(s.key, e.target.value)}
                          placeholder={`${s.label}をメモ...`} autoFocus />

                        {/* AI consult button */}
                        <button className={`ai-btn${copiedStep === s.key ? " copied" : ""}`}
                          onClick={() => handleAICopy(s.key)}>
                          {copiedStep === s.key
                            ? "✓ コピーしました！claude.ai に貼り付けてください"
                            : "🤖 AIに相談（プロンプトをコピー）"}
                        </button>

                        <div className="card-nav">
                          {i > 0 ? (
                            <button className="nav-btn nav-btn-prev" onClick={() => setActiveStep(STEPS[i-1].key)}>
                              ← {STEPS[i-1].key}
                            </button>
                          ) : <div />}
                          {i < STEPS.length - 1 && (
                            <button className="nav-btn" onClick={() => setActiveStep(STEPS[i+1].key)}
                              style={{ background: `${STEPS[i+1].color}22`, border: `1px solid ${STEPS[i+1].color}44`, color: STEPS[i+1].color }}>
                              {STEPS[i+1].key} →
                            </button>
                          )}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}

              {/* Warning */}
              <div className="warning-card">
                <div className="warning-title">⚠ TASKバカ注意報</div>
                <div className="warning-body">
                  いきなり「T（TASK）」から始めていないか？
                  <br /><span style={{ color: "#E8443A" }}>ロ→サ</span> を飛ばすと、
                  論点がズレた作業を大量にこなす「TASKバカ」になる。
                  <br /><strong style={{ color: "#c8a860" }}>まず論点。常に論点に立ち返る。</strong>
                </div>
              </div>

              {/* Checklist */}
              <div className="checklist-card">
                <div className="checklist-title">🔍 セルフチェック</div>
                {CHECKLIST.map((q, i) => (
                  <div key={i} className="checklist-item" onClick={() => toggleChecklist(i)}>
                    <span className="checklist-box" style={{ color: checklist[i] ? "#7B68EE" : "var(--text-very-faint)" }}>
                      {checklist[i] ? "☑" : "☐"}
                    </span>
                    <span style={{ textDecoration: checklist[i] ? "line-through" : "none", color: checklist[i] ? "var(--text-very-faint)" : "var(--text-muted)" }}>
                      {q}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ===== OVERVIEW MODE ===== */}
          {viewMode === "overview" && (
            <div className="overview-grid">
              {STEPS.map(s => (
                <div key={s.key} className="overview-card" style={{ borderLeft: `3px solid ${s.color}` }}>
                  <div className="overview-header">
                    <span style={{ color: s.color, fontWeight: 900, fontSize: "18px" }}>{s.key}</span>
                    <span>{s.label}</span>
                  </div>
                  <textarea className="card-textarea" style={{ border: `1px solid ${s.color}33`, minHeight: "80px" }}
                    value={notes[s.key] || ""} onChange={e => updateNotes(s.key, e.target.value)}
                    placeholder={`${s.label}をメモ...`} />
                </div>
              ))}
            </div>
          )}

          {/* ===== TREE MODE ===== */}
          {viewMode === "tree" && (() => {
            const tree = buildTree();
            const hasData = tree.ronten || tree.subLines.length > 0;
            return (
              <div className="tree-container">
                {!hasData && (
                  <div className="tree-empty">
                    ロ（論点）とサ（サブ論点）にメモを入力すると、ここにツリーが表示されます。
                  </div>
                )}
                {hasData && (
                  <div>
                    <div className="tree-root-label"
                      style={{ background: `${STEPS[0].color}18`, color: STEPS[0].color, border: `1px solid ${STEPS[0].color}33` }}
                      onClick={() => { setViewMode("single"); setActiveStep("ロ"); }}>
                      🎯 {tree.ronten || "（論点を入力してください）"}
                    </div>

                    {tree.subLines.length > 0 ? (
                      <div className="tree-branch">
                        {tree.subLines.map((sub, i) => (
                          <div key={i} className="tree-node">
                            <div className="tree-node-label"
                              style={{ background: `${STEPS[1].color}15`, color: STEPS[1].color, border: `1px solid ${STEPS[1].color}22` }}
                              onClick={() => { setViewMode("single"); setActiveStep("サ"); }}>
                              {sub}
                            </div>
                            {tree.taskLines[i] && (
                              <div className="tree-sub-branch">
                                <div className="tree-node">
                                  <div className="tree-node-label"
                                    style={{ background: `${STEPS[2].color}12`, color: STEPS[2].color, border: `1px solid ${STEPS[2].color}22`, fontSize: "12px" }}
                                    onClick={() => { setViewMode("single"); setActiveStep("T"); }}>
                                    📋 {tree.taskLines[i]}
                                  </div>
                                </div>
                              </div>
                            )}
                            {tree.schedLines[i] && (
                              <div className="tree-sub-branch">
                                <div className="tree-node">
                                  <div className="tree-node-label"
                                    style={{ background: `${STEPS[3].color}12`, color: STEPS[3].color, border: `1px solid ${STEPS[3].color}22`, fontSize: "11px" }}
                                    onClick={() => { setViewMode("single"); setActiveStep("ス"); }}>
                                    📅 {tree.schedLines[i]}
                                  </div>
                                </div>
                              </div>
                            )}
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="tree-empty">サブ論点を入力するとここに分岐が表示されます</div>
                    )}
                  </div>
                )}

                <div className="warning-card" style={{ marginTop: "24px" }}>
                  <div className="warning-title">⚠ TASKバカ注意報</div>
                  <div className="warning-body">
                    いきなり「T（TASK）」から始めていないか？
                    <br /><span style={{ color: "#E8443A" }}>ロ→サ</span> を飛ばすと、TASKバカになる。
                    <br /><strong style={{ color: "#c8a860" }}>まず論点。常に論点に立ち返る。</strong>
                  </div>
                </div>
              </div>
            );
          })()}

          {/* Template modal */}
          {showTemplateModal && (
            <div className="modal-overlay" onClick={() => setShowTemplateModal(false)}>
              <div className="modal" onClick={e => e.stopPropagation()}>
                <div className="modal-title">新規プロジェクト</div>
                <div style={{ fontSize: "12px", color: "var(--text-muted)", marginBottom: "16px" }}>
                  テンプレートを選んでください
                </div>
                {TEMPLATES.map((t, i) => (
                  <button key={i} className="template-btn" onClick={() => createProjectFromTemplate(t)}>
                    <div className="template-btn-name">{t.name}</div>
                    <div className="template-btn-desc">{t.desc}</div>
                  </button>
                ))}
                <button className="btn btn-muted" style={{ width: "100%", marginTop: "8px" }}
                  onClick={() => setShowTemplateModal(false)}>キャンセル</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
