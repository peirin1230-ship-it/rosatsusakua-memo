<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ロサTス作ア メモ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* ===== Theme Variables ===== */
    :root {
      --bg-primary: #1a1a1e;
      --bg-secondary: #222;
      --bg-card: #1e1e22;
      --bg-card-active: #222228;
      --bg-header: linear-gradient(135deg, #1a1a1e 0%, #2a2a30 100%);
      --bg-input: #222;
      --bg-btn: #333;
      --bg-btn-hover: #444;
      --bg-overlay: rgba(0,0,0,0.6);
      --bg-modal: #222228;
      --bg-tip: #2a2520;
      --bg-warning: #1c1416;
      --bg-checklist: #161820;
      --bg-export-menu: #2a2a30;
      --text-primary: #e8e6e3;
      --text-secondary: #ccc;
      --text-muted: #888;
      --text-faint: #666;
      --text-very-faint: #555;
      --text-hint: #999;
      --border-primary: #333;
      --border-secondary: #444;
      --border-tertiary: #555;
      --border-input: #3a3a3a;
      --border-tip: #4a3a20;
      --border-warning: #3a2028;
      --border-checklist: #252840;
      --progress-bg: #333;
      --flow-arrow: #444;
      --flow-circle-bg: #222;
      --flow-circle-filled: #2a2a30;
      --tree-line: #444;
      --tree-sub-line: #333;
      --tip-color: #c8a860;
      --tip-close: #886830;
      --ai-bg: #1a2030;
      --ai-border: #2a3a5a;
      --ai-color: #7B9ED9;
      --ai-bg-hover: #2a3040;
      --ai-copied-bg: #1a3020;
      --ai-copied-border: #2a5a3a;
      --btn-new-bg: #2a3a2a;
      --btn-new-border: #3a5a3a;
      --btn-new-color: #6c6;
      --btn-new-hover: #3a4a3a;
      --btn-del-bg: #3a2a2a;
      --btn-del-border: #5a3a3a;
      --btn-del-color: #c66;
      --btn-del-hover: #4a3a3a;
      --sp-card-bg: #1a1a1e;
      --sp-card-border: #333;
    }
    [data-theme="light"] {
      --bg-primary: #F2F2F2;
      --bg-secondary: #FFFFFF;
      --bg-card: #FFFFFF;
      --bg-card-active: #FAFAFA;
      --bg-header: linear-gradient(135deg, #FFFFFF 0%, #F5F5F5 100%);
      --bg-input: #FFFFFF;
      --bg-btn: #F5F5F5;
      --bg-btn-hover: #E5E5E5;
      --bg-overlay: rgba(0,0,0,0.3);
      --bg-modal: #FFFFFF;
      --bg-tip: #FFFBEB;
      --bg-warning: #FEF2F2;
      --bg-checklist: #F5F5FF;
      --bg-export-menu: #FFFFFF;
      --text-primary: #262626;
      --text-secondary: #404040;
      --text-muted: #737373;
      --text-faint: #8B8B8B;
      --text-very-faint: #A3A3A3;
      --text-hint: #737373;
      --border-primary: #E0E0E0;
      --border-secondary: #D4D4D4;
      --border-tertiary: #C0C0C0;
      --border-input: #E0E0E0;
      --border-tip: #F59E0B;
      --border-warning: #FECACA;
      --border-checklist: #D0D0E8;
      --progress-bg: #E0E0E0;
      --flow-arrow: #A3A3A3;
      --flow-circle-bg: #FFFFFF;
      --flow-circle-filled: #F5F5F5;
      --tree-line: #D4D4D4;
      --tree-sub-line: #E0E0E0;
      --tip-color: #92400E;
      --tip-close: #B45309;
      --ai-bg: #EFF6FF;
      --ai-border: #BFDBFE;
      --ai-color: #3B82F6;
      --ai-bg-hover: #DBEAFE;
      --ai-copied-bg: #F0FDF4;
      --ai-copied-border: #86EFAC;
      --btn-new-bg: #F0FDF4;
      --btn-new-border: #86EFAC;
      --btn-new-color: #16A34A;
      --btn-new-hover: #DCFCE7;
      --btn-del-bg: #FEF2F2;
      --btn-del-border: #FECACA;
      --btn-del-color: #EF4444;
      --btn-del-hover: #FEE2E2;
      --sp-card-bg: #F8F8FA;
      --sp-card-border: #E0E0E0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Noto Sans JP', 'Helvetica Neue', sans-serif; transition: background 0.3s, color 0.3s; }
    .mono { font-family: 'IBM Plex Mono', monospace; }

    .header { background: var(--bg-header); border-bottom: 1px solid var(--border-primary); padding: 20px 24px 16px; position: sticky; top: 0; z-index: 10; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .header-subtitle { font-size: 13px; font-weight: 400; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }
    .header-title { font-size: 28px; font-weight: 900; margin-top: 4px; letter-spacing: 6px; display: flex; gap: 2px; }
    .btn { background: var(--bg-btn); border: 1px solid var(--border-tertiary); color: var(--text-secondary); padding: 6px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; transition: background 0.2s; }
    .btn:hover { background: var(--bg-btn-hover); }
    .btn-muted { color: var(--text-muted); }
    .btn-new { background: var(--btn-new-bg); border: 1px solid var(--btn-new-border); color: var(--btn-new-color); }
    .btn-new:hover { background: var(--btn-new-hover); }
    .btn-delete { background: var(--btn-del-bg); border: 1px solid var(--btn-del-border); color: var(--btn-del-color); }
    .btn-delete:hover { background: var(--btn-del-hover); }
    .btn-theme { background: var(--bg-btn); border: 1px solid var(--border-secondary); color: var(--text-muted); padding: 6px 10px; border-radius: 6px; font-size: 14px; cursor: pointer; transition: background 0.2s; line-height: 1; }
    .btn-theme:hover { background: var(--bg-btn-hover); }
    .project-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border-input); border-radius: 6px; padding: 8px 12px; color: var(--text-primary); font-size: 14px; font-family: 'Noto Sans JP', sans-serif; outline: none; box-sizing: border-box; margin-bottom: 10px; transition: background 0.3s, color 0.3s; }
    .progress-bar { flex: 1; height: 3px; background: var(--progress-bg); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; background: linear-gradient(90deg, #E8443A, #E07B2E, #D4A72C, #3BA55D, #4A90D9, #7B68EE); }
    .project-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .project-select { flex: 1; background: var(--bg-input); border: 1px solid var(--border-input); border-radius: 6px; padding: 6px 10px; color: var(--text-primary); font-size: 13px; font-family: 'Noto Sans JP', sans-serif; outline: none; transition: background 0.3s, color 0.3s; }
    .tip-banner { margin: 16px 16px 0; padding: 12px 16px; background: var(--bg-tip); border: 1px solid var(--border-tip); border-radius: 8px; font-size: 12px; color: var(--tip-color); display: flex; justify-content: space-between; align-items: flex-start; line-height: 1.6; }
    .tip-close { background: none; border: none; color: var(--tip-close); cursor: pointer; font-size: 16px; padding: 0 0 0 12px; line-height: 1; }
    .flow-row { display: flex; justify-content: center; align-items: center; padding: 20px 16px 8px; gap: 4px; flex-wrap: wrap; }
    .flow-circle { width: 40px; height: 40px; border-radius: 50%; font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; position: relative; border: 2px solid var(--border-secondary); background: var(--flow-circle-bg); color: var(--text-faint); font-family: 'Noto Sans JP', sans-serif; }
    .flow-circle .dot { position: absolute; top: -2px; right: -2px; width: 10px; height: 10px; border-radius: 50%; }
    .flow-d { width: 40px; height: 40px; border-radius: 50%; border: 2px dashed var(--border-tertiary); background: var(--flow-circle-bg); color: var(--text-faint); font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; font-family: 'Noto Sans JP', sans-serif; }
    .flow-hint { text-align: center; font-size: 10px; color: var(--text-very-faint); margin-bottom: 8px; }
    .view-toggle-bar { display: flex; justify-content: center; gap: 4px; margin-bottom: 12px; }
    .view-btn { background: var(--bg-secondary); border: 1px solid var(--border-secondary); color: var(--text-muted); padding: 4px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; transition: background 0.2s; }
    .view-btn.active { background: var(--bg-btn); border-color: var(--border-tertiary); color: var(--text-primary); }
    .cards { padding: 8px 16px 100px; }
    .card { margin-bottom: 8px; border-radius: 10px; border: 1px solid var(--border-primary); background: var(--bg-card); overflow: hidden; transition: all 0.3s ease; }
    .card.active { background: var(--bg-card-active); }
    .card-header { width: 100%; display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: none; border: none; cursor: pointer; text-align: left; color: var(--text-primary); }
    .card-key { font-size: 20px; font-weight: 900; min-width: 28px; font-family: 'Noto Sans JP', sans-serif; }
    .card-label { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .card-question { font-size: 11px; color: var(--text-hint); margin-top: 2px; }
    .card-chevron { color: var(--text-very-faint); font-size: 16px; transition: transform 0.2s ease; }
    .card-chevron.open { transform: rotate(180deg); }
    .card-body { padding: 0 16px 16px; }
    .card-hint { padding: 10px 12px; border-radius: 6px; margin-bottom: 10px; }
    .card-hint-text { font-size: 12px; color: var(--text-hint); white-space: pre-line; line-height: 1.6; }
    .card-hint-example { font-size: 11px; margin-top: 6px; opacity: 0.7; }
    .card-textarea { width: 100%; min-height: 80px; background: var(--bg-primary); border-radius: 6px; padding: 10px 12px; color: var(--text-primary); font-size: 13px; font-family: 'Noto Sans JP', sans-serif; line-height: 1.8; outline: none; resize: vertical; box-sizing: border-box; transition: background 0.3s, color 0.3s; }
    .card-nav { display: flex; justify-content: space-between; margin-top: 8px; }
    .nav-btn { background: none; padding: 6px 14px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; }
    .nav-btn-prev { border: 1px solid var(--border-secondary); color: var(--text-muted); }
    .filled-dot { width: 6px; height: 6px; border-radius: 50%; }

    /* Sub-point card */
    .sp-card { background: var(--sp-card-bg); border: 1px solid var(--sp-card-border); border-radius: 8px; padding: 14px; margin-bottom: 10px; position: relative; }
    .sp-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .sp-card-num { font-size: 13px; font-weight: 700; }
    .sp-remove { background: none; border: none; color: var(--text-very-faint); cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px; line-height: 1; }
    .sp-remove:hover { color: var(--btn-del-color); }
    .sp-field-label { font-size: 11px; font-weight: 600; margin: 8px 0 4px; display: flex; align-items: center; gap: 6px; }
    .sp-field-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .sp-input { width: 100%; background: var(--bg-primary); border-radius: 6px; padding: 8px 10px; color: var(--text-primary); font-size: 13px; font-family: 'Noto Sans JP', sans-serif; line-height: 1.6; outline: none; resize: vertical; box-sizing: border-box; transition: background 0.3s, color 0.3s; }
    .sp-add-btn { width: 100%; padding: 10px; background: var(--bg-card); border: 2px dashed var(--border-secondary); border-radius: 8px; color: var(--text-muted); font-size: 13px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: border-color 0.2s, color 0.2s; }
    .sp-add-btn:hover { border-color: #E07B2E; color: #E07B2E; }

    .ai-btn { background: var(--ai-bg); border: 1px solid var(--ai-border); color: var(--ai-color); padding: 8px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; margin-top: 8px; width: 100%; font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s; }
    .ai-btn:hover { background: var(--ai-bg-hover); }
    .ai-btn.copied { background: var(--ai-copied-bg); border-color: var(--ai-copied-border); color: var(--btn-new-color); }

    /* Overview */
    .overview-container { padding: 8px 16px 100px; }
    .overview-section { margin-bottom: 16px; }
    .overview-section-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .overview-sp-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 6px; }
    @media (max-width: 640px) { .overview-sp-row { grid-template-columns: 1fr; } }
    .overview-sp-cell { background: var(--bg-card); border: 1px solid var(--border-primary); border-radius: 6px; padding: 8px; }
    .overview-sp-label { font-size: 10px; font-weight: 600; margin-bottom: 4px; }

    /* Tree */
    .tree-container { padding: 16px 24px 100px; }
    .tree-root-label { font-size: 15px; font-weight: 700; padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; cursor: pointer; }
    .tree-branch { padding-left: 24px; position: relative; }
    .tree-branch::before { content: ""; position: absolute; left: 10px; top: 0; bottom: 12px; border-left: 1px dashed var(--tree-line); }
    .tree-node { position: relative; padding: 6px 0 6px 20px; }
    .tree-node::before { content: ""; position: absolute; left: -14px; top: 18px; width: 14px; border-top: 1px dashed var(--tree-line); }
    .tree-node-label { font-size: 13px; padding: 4px 10px; border-radius: 4px; cursor: pointer; display: inline-block; transition: background 0.2s; }
    .tree-node-label:hover { filter: brightness(1.1); }
    .tree-sub-branch { padding-left: 24px; position: relative; }
    .tree-sub-branch::before { content: ""; position: absolute; left: 10px; top: 0; bottom: 12px; border-left: 1px dashed var(--tree-sub-line); }
    .tree-empty { color: var(--text-very-faint); font-size: 12px; font-style: italic; padding: 8px 0 8px 24px; }

    .warning-card { margin-top: 16px; padding: 16px; background: var(--bg-warning); border: 1px solid var(--border-warning); border-radius: 10px; }
    .warning-title { font-size: 13px; font-weight: 700; color: #E8443A; margin-bottom: 8px; }
    .warning-body { font-size: 12px; color: var(--text-hint); line-height: 1.8; }
    .checklist-card { margin-top: 12px; padding: 16px; background: var(--bg-checklist); border: 1px solid var(--border-checklist); border-radius: 10px; }
    .checklist-title { font-size: 13px; font-weight: 700; color: #7B68EE; margin-bottom: 10px; }
    .checklist-item { font-size: 12px; color: var(--text-muted); padding: 6px 0; line-height: 1.6; cursor: pointer; user-select: none; transition: opacity 0.2s; }
    .checklist-item:hover { opacity: 0.8; }
    .checklist-item:not(:last-child) { border-bottom: 1px solid var(--border-checklist); }
    .checklist-box { margin-right: 8px; }
    .export-menu-wrapper { position: relative; display: inline-block; }
    .export-menu { position: absolute; top: 100%; left: 0; margin-top: 4px; background: var(--bg-export-menu); border: 1px solid var(--border-secondary); border-radius: 6px; overflow: hidden; z-index: 20; min-width: 160px; }
    .export-menu button { display: block; width: 100%; background: none; border: none; color: var(--text-secondary); padding: 8px 12px; font-size: 12px; cursor: pointer; text-align: left; font-family: 'Noto Sans JP', sans-serif; }
    .export-menu button:hover { background: var(--bg-btn); }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-overlay); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .modal { background: var(--bg-modal); border: 1px solid var(--border-secondary); border-radius: 12px; padding: 24px; max-width: 400px; width: 100%; }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .template-btn { display: block; width: 100%; background: var(--bg-card); border: 1px solid var(--border-primary); color: var(--text-primary); padding: 12px 16px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; text-align: left; font-family: 'Noto Sans JP', sans-serif; transition: border-color 0.2s; }
    .template-btn:hover { border-color: var(--border-tertiary); }
    .template-btn-name { font-size: 14px; font-weight: 500; }
    .template-btn-desc { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .timestamp { font-size: 10px; color: var(--text-very-faint); text-align: right; margin-top: 4px; font-family: 'IBM Plex Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Step colors & metadata
    const C = {
      "ロ": { label: "論点", color: "#E8443A", hint: "そもそも何を答えるべき？\n「〜すべきか？」の形で書く", example: "例：新規事業Xに参入すべきか？", question: "この仕事のBIG QUESTIONは？" },
      "サ": { label: "サブ論点", color: "#E07B2E" },
      "T": { label: "TASK", color: "#D4A72C" },
      "ス": { label: "スケジュール", color: "#3BA55D" },
      "作": { label: "作業", color: "#4A90D9", hint: "手を動かすフェーズ\nでも常に論点に立ち返る", example: "例：Excelで数値分析 → Wordで示唆まとめ", question: "ちゃんと論点に答える作業してる？" },
      "ア": { label: "アウトプット", color: "#7B68EE", hint: "最終成果物\n→ そのあと必ずD（議論）へ", example: "例：提案スライド10枚 → 上司とディスカッション", question: "論点にストレートに答えてる？" },
    };
    const FLOW_KEYS = ["ロ", "サ", "T", "ス", "作", "ア"];
    // Main navigable steps: サ/T/ス are combined into "サ"
    const MAIN_STEPS = [
      { key: "ロ", label: "論点", question: "この仕事のBIG QUESTIONは？" },
      { key: "サ", label: "サブ論点 → TASK → スケジュール", question: "論点を分解し、各サブ論点に作業と期限を紐づける" },
      { key: "作", label: "作業", question: "ちゃんと論点に答える作業してる？" },
      { key: "ア", label: "アウトプット", question: "論点にストレートに答えてる？" },
    ];

    const CHECKLIST = [
      "論点は「〜すべきか？」の形になってる？",
      "サブ論点は論点の「答え」を作れる問いになってる？",
      "TASKはサブ論点に紐づいてる？宙ぶらりんのTASKない？",
      "アウトプットは論点にストレートに答えてる？",
      "最後にD（ディスカッション）ちゃんとやった？",
    ];

    const TEMPLATES = [
      { name: "新規事業検討", desc: "参入判断のための論点・サブ論点・TASKをセット",
        notes: { "ロ": "新規事業Xに参入すべきか？", "作": "", "ア": "" },
        subPoints: [
          { content: "市場規模は十分か？", tasks: [{ content: "業界レポート分析", schedule: "Day1-2" }] },
          { content: "自社の強みを活かせるか？", tasks: [{ content: "競合3社のベンチマーク", schedule: "Day2-3" }] },
          { content: "収益性は確保できるか？", tasks: [{ content: "事業計画シミュレーション", schedule: "Day3-4" }] },
          { content: "リスクは許容範囲か？", tasks: [{ content: "リスク洗い出しと対策案", schedule: "Day4-5" }] },
        ],
      },
      { name: "業務改善提案", desc: "現状の問題を分析し改善策を提案する",
        notes: { "ロ": "○○プロセスを改善すべきか？", "作": "", "ア": "" },
        subPoints: [
          { content: "現状の問題点は何か？", tasks: [{ content: "現状フローの可視化", schedule: "" }] },
          { content: "改善によるインパクトはどの程度か？", tasks: [{ content: "関係者ヒアリング3名", schedule: "" }] },
          { content: "実現可能性は？", tasks: [{ content: "改善案の設計", schedule: "" }] },
          { content: "コストは見合うか？", tasks: [{ content: "コスト試算", schedule: "" }] },
        ],
      },
      { name: "問題解決", desc: "発生した問題の原因特定と解決策を検討",
        notes: { "ロ": "○○問題をどう解決すべきか？", "作": "", "ア": "" },
        subPoints: [
          { content: "根本原因は何か？", tasks: [{ content: "事象の時系列整理", schedule: "" }, { content: "原因の仮説立て→検証", schedule: "" }] },
          { content: "影響範囲はどこまでか？", tasks: [{ content: "関係者からの情報収集", schedule: "" }] },
          { content: "どの解決策が最も効果的か？", tasks: [{ content: "解決策の比較検討", schedule: "" }] },
        ],
      },
      { name: "白紙（空のプロジェクト）", desc: "何も入っていない状態から始める", notes: {}, subPoints: [] },
    ];

    const AI_PROMPTS = {
      "ロ": "現在「論点」のステップにいます。\nこの論点が適切か、もっと鋭くできないか、一緒に考えてください。\n論点は「〜すべきか？」の形にするのが基本です。",
      "サ": "現在「サブ論点」のステップにいます。\n各サブ論点が適切か、漏れがないか確認してください。\nMECEを意識して3〜5個に分解したいです。\nまた、各サブ論点に紐づくTASKとスケジュールも見てください。",
      "作": "現在「作業」のステップにいます。\n作業が論点にちゃんと答えるものになっているか、ズレていないかチェックしてください。",
      "ア": "現在「アウトプット」のステップにいます。\nこのアウトプットが論点にストレートに答えているか確認してください。\nディスカッション（D）の準備として何を意識すべきかも教えてください。",
    };

    const generateId = () => {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    };

    // Migrate old format → new format
    const migrateProject = (p) => {
      if (!p.subPoints) {
        // v1: flat notes["サ"], notes["T"], notes["ス"]
        const n = p.notes || {};
        if (!n["サ"] && !n["T"] && !n["ス"]) { p.subPoints = []; }
        else {
          const parse = (t) => (t || "").split("\n").map(l => l.replace(/^[\s・\-\*●◯◆■□→]+/, "").trim()).filter(Boolean);
          const subs = parse(n["サ"]);
          const tasks = parse(n["T"]);
          const scheds = parse(n["ス"]);
          p.subPoints = subs.map((s, i) => ({
            id: generateId(), content: s,
            tasks: tasks[i] ? [{ id: generateId(), content: tasks[i], schedule: scheds[i] || "" }] : [],
          }));
        }
        delete n["サ"]; delete n["T"]; delete n["ス"];
      }
      // v2: subPoints with task (string) + schedule → tasks array
      if (p.subPoints) {
        p.subPoints = p.subPoints.map(sp => {
          if (sp.tasks) return sp; // already v3
          const tasks = [];
          if (sp.task?.trim()) tasks.push({ id: generateId(), content: sp.task, schedule: sp.schedule || "" });
          else if (sp.schedule?.trim()) tasks.push({ id: generateId(), content: "", schedule: sp.schedule });
          const { task, schedule, ...rest } = sp;
          return { ...rest, tasks, id: sp.id || generateId() };
        });
      }
      return p;
    };

    const parseImportText = (text) => {
      const lines = text.split("\n");
      let name = ""; const notes = {}; let currentKey = null; let currentLines = [];
      for (const line of lines) {
        if (line.startsWith("# ") && !line.includes("ロ→サ") && !name) { name = line.slice(2).trim(); continue; }
        const m = line.match(/^## \[(.)\] /) || line.match(/^## (.) /);
        if (m && "ロサTス作ア".includes(m[1])) {
          if (currentKey) notes[currentKey] = currentLines.join("\n").trim();
          currentKey = m[1]; currentLines = []; continue;
        }
        if (line === "---" || line.startsWith("# ロ→サ") || line.startsWith("> ロ→サ")) continue;
        if (currentKey) currentLines.push(line);
      }
      if (currentKey) notes[currentKey] = currentLines.join("\n").trim();
      for (const k of Object.keys(notes)) { if (notes[k] === "（未記入）" || notes[k] === "*未記入*") notes[k] = ""; }
      return { name, notes };
    };

    function App() {
      const [projects, setProjects] = useState(() => {
        try {
          const s = localStorage.getItem("rosatsusakua-projects");
          if (!s) return {};
          const ps = JSON.parse(s);
          Object.values(ps).forEach(migrateProject);
          return ps;
        } catch { return {}; }
      });
      const [currentProjectId, setCurrentProjectId] = useState(() => {
        try { return localStorage.getItem("rosatsusakua-current") || null; } catch { return null; }
      });
      const [theme, setTheme] = useState(() => {
        try { return localStorage.getItem("rosatsusakua-theme") || "dark"; } catch { return "dark"; }
      });
      const [activeStep, setActiveStep] = useState(null);
      const [showTip, setShowTip] = useState(true);
      const [viewMode, setViewMode] = useState("single");
      const [showExportMenu, setShowExportMenu] = useState(false);
      const [showTemplateModal, setShowTemplateModal] = useState(false);
      const [copiedStep, setCopiedStep] = useState(null);

      useEffect(() => { try { localStorage.setItem("rosatsusakua-projects", JSON.stringify(projects)); } catch {} }, [projects]);
      useEffect(() => { try { if (currentProjectId) localStorage.setItem("rosatsusakua-current", currentProjectId); else localStorage.removeItem("rosatsusakua-current"); } catch {} }, [currentProjectId]);
      useEffect(() => { document.documentElement.setAttribute("data-theme", theme); try { localStorage.setItem("rosatsusakua-theme", theme); } catch {} }, [theme]);
      useEffect(() => {
        if (Object.keys(projects).length === 0) {
          const id = generateId(); const now = new Date().toISOString();
          setProjects({ [id]: { id, name: "", notes: {}, subPoints: [], checklist: {}, createdAt: now, updatedAt: now } });
          setCurrentProjectId(id);
        } else if (!currentProjectId || !projects[currentProjectId]) {
          setCurrentProjectId(Object.keys(projects)[0]);
        }
      }, []);

      const cur = currentProjectId ? projects[currentProjectId] : null;
      const notes = cur?.notes || {};
      const projectName = cur?.name || "";
      const subPoints = cur?.subPoints || [];
      const checklist = cur?.checklist || {};

      // Progress: ロ filled, any サ filled, any T filled, any ス filled, 作 filled, ア filled → /6
      const hasSub = subPoints.some(sp => sp.content?.trim());
      const hasTask = subPoints.some(sp => sp.tasks?.some(tk => tk.content?.trim()));
      const hasSched = subPoints.some(sp => sp.tasks?.some(tk => tk.schedule?.trim()));
      const filledCount = [notes["ロ"]?.trim(), hasSub, hasTask, hasSched, notes["作"]?.trim(), notes["ア"]?.trim()].filter(Boolean).length;
      const progress = (filledCount / 6) * 100;
      const projectList = Object.values(projects).sort((a, b) => (b.updatedAt || "").localeCompare(a.updatedAt || ""));

      // Check which flow keys have data
      const flowFilled = {
        "ロ": !!notes["ロ"]?.trim(), "サ": hasSub, "T": hasTask, "ス": hasSched,
        "作": !!notes["作"]?.trim(), "ア": !!notes["ア"]?.trim(),
      };

      const toggleTheme = () => setTheme(p => p === "dark" ? "light" : "dark");
      const now = () => new Date().toISOString();
      const touch = (proj) => ({ ...proj, updatedAt: now() });

      const createProjectFromTemplate = (t) => {
        const id = generateId(); const n = now();
        const sps = (t.subPoints || []).map(sp => ({ ...sp, id: generateId(), tasks: (sp.tasks || []).map(tk => ({ ...tk, id: generateId() })) }));
        setProjects(prev => ({ ...prev, [id]: { id, name: t.name === "白紙（空のプロジェクト）" ? "" : t.name, notes: { ...(t.notes || {}) }, subPoints: sps, checklist: {}, createdAt: n, updatedAt: n } }));
        setCurrentProjectId(id); setActiveStep(null); setShowTemplateModal(false);
      };
      const switchProject = (id) => { setCurrentProjectId(id); setActiveStep(null); };
      const deleteProject = () => {
        if (!currentProjectId || !confirm("このプロジェクトを削除しますか？")) return;
        const next = { ...projects }; delete next[currentProjectId]; setProjects(next);
        const rem = Object.keys(next); setCurrentProjectId(rem.length > 0 ? rem[0] : null); setActiveStep(null);
      };

      const updateNote = (key, value) => {
        if (!currentProjectId) return;
        setProjects(prev => ({ ...prev, [currentProjectId]: touch({ ...prev[currentProjectId], notes: { ...prev[currentProjectId].notes, [key]: value } }) }));
      };
      const updateProjectName = (name) => {
        if (!currentProjectId) return;
        setProjects(prev => ({ ...prev, [currentProjectId]: touch({ ...prev[currentProjectId], name }) }));
      };
      const toggleChecklist = (i) => {
        if (!currentProjectId) return;
        setProjects(prev => ({ ...prev, [currentProjectId]: touch({ ...prev[currentProjectId], checklist: { ...prev[currentProjectId].checklist, [i]: !prev[currentProjectId].checklist?.[i] } }) }));
      };

      // Sub-point operations
      const addSubPoint = () => {
        if (!currentProjectId) return;
        setProjects(prev => ({ ...prev, [currentProjectId]: touch({ ...prev[currentProjectId], subPoints: [...(prev[currentProjectId].subPoints || []), { id: generateId(), content: "", tasks: [{ id: generateId(), content: "", schedule: "" }] }] }) }));
      };
      const removeSubPoint = (spId) => {
        if (!currentProjectId) return;
        setProjects(prev => ({ ...prev, [currentProjectId]: touch({ ...prev[currentProjectId], subPoints: prev[currentProjectId].subPoints.filter(sp => sp.id !== spId) }) }));
      };
      const updateSubPoint = (spId, field, value) => {
        if (!currentProjectId) return;
        setProjects(prev => ({ ...prev, [currentProjectId]: touch({ ...prev[currentProjectId], subPoints: prev[currentProjectId].subPoints.map(sp => sp.id === spId ? { ...sp, [field]: value } : sp) }) }));
      };
      // Task operations within a sub-point
      const addTask = (spId) => {
        if (!currentProjectId) return;
        setProjects(prev => ({ ...prev, [currentProjectId]: touch({ ...prev[currentProjectId], subPoints: prev[currentProjectId].subPoints.map(sp => sp.id === spId ? { ...sp, tasks: [...(sp.tasks || []), { id: generateId(), content: "", schedule: "" }] } : sp) }) }));
      };
      const removeTask = (spId, tkId) => {
        if (!currentProjectId) return;
        setProjects(prev => ({ ...prev, [currentProjectId]: touch({ ...prev[currentProjectId], subPoints: prev[currentProjectId].subPoints.map(sp => sp.id === spId ? { ...sp, tasks: sp.tasks.filter(tk => tk.id !== tkId) } : sp) }) }));
      };
      const updateTask = (spId, tkId, field, value) => {
        if (!currentProjectId) return;
        setProjects(prev => ({ ...prev, [currentProjectId]: touch({ ...prev[currentProjectId], subPoints: prev[currentProjectId].subPoints.map(sp => sp.id === spId ? { ...sp, tasks: sp.tasks.map(tk => tk.id === tkId ? { ...tk, [field]: value } : tk) } : sp) }) }));
      };

      // Export
      const handleExport = (format) => {
        setShowExportMenu(false);
        const pName = projectName || "無題のプロジェクト";
        let text, filename;
        if (format === "md") {
          text = `# ${pName}\n\n> ロ→サ→T→ス→作→ア フレームワーク\n\n---\n\n`;
          text += `## ロ 論点\n\n${notes["ロ"]?.trim() || "*未記入*"}\n\n`;
          text += `## サ サブ論点 → TASK → スケジュール\n\n`;
          if (subPoints.length === 0) { text += `*未記入*\n\n`; }
          else { subPoints.forEach((sp, i) => {
            text += `### ${i + 1}. ${sp.content || "（未記入）"}\n\n`;
            if (!sp.tasks || sp.tasks.length === 0) { text += `- TASK: （未記入）\n\n`; }
            else { sp.tasks.forEach((tk, j) => {
              text += `- **TASK${sp.tasks.length > 1 ? ` ${j + 1}` : ""}**: ${tk.content || "（未記入）"}`;
              if (tk.schedule?.trim()) text += ` [${tk.schedule}]`;
              text += `\n`;
            }); text += `\n`; }
          }); }
          text += `## 作 作業\n\n${notes["作"]?.trim() || "*未記入*"}\n\n`;
          text += `## ア アウトプット\n\n${notes["ア"]?.trim() || "*未記入*"}\n\n`;
          text += `---\n\n## セルフチェック\n\n`;
          CHECKLIST.forEach((q, i) => { text += `- [${checklist[i] ? "x" : " "}] ${q}\n`; });
          text += `\n---\n*最終更新: ${new Date().toLocaleString("ja-JP")}*\n`;
          filename = `${pName}-memo.md`;
        } else {
          text = `# ${pName}\n# ロ→サ→T→ス→作→ア メモ\n---\n\n`;
          text += `## [ロ] 論点\n${notes["ロ"] || "（未記入）"}\n\n`;
          text += `## [サ] サブ論点\n`;
          if (subPoints.length === 0) { text += `（未記入）\n\n`; }
          else { subPoints.forEach((sp, i) => { text += `${i + 1}. ${sp.content || "（未記入）"}\n`; }); text += `\n`; }
          text += `## [T] TASK / [ス] スケジュール\n`;
          if (subPoints.length === 0) { text += `（未記入）\n\n`; }
          else { subPoints.forEach((sp, i) => {
            text += `--- サブ論点${i + 1}: ${sp.content || "（未記入）"} ---\n`;
            if (!sp.tasks || sp.tasks.length === 0) { text += `  T: （未記入）\n`; }
            else { sp.tasks.forEach((tk, j) => { text += `  T${sp.tasks.length > 1 ? j + 1 : ""}: ${tk.content || "（未記入）"} / ス: ${tk.schedule || "（未記入）"}\n`; }); }
          }); text += `\n`; }
          text += `## [作] 作業\n${notes["作"] || "（未記入）"}\n\n`;
          text += `## [ア] アウトプット\n${notes["ア"] || "（未記入）"}\n\n`;
          filename = `${pName}-memo.txt`;
        }
        const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = filename; a.click(); URL.revokeObjectURL(url);
      };

      const handleImport = () => {
        const input = document.createElement("input"); input.type = "file"; input.accept = ".txt,.md";
        input.onchange = (e) => {
          const file = e.target.files[0]; if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            const parsed = parseImportText(ev.target.result);
            const id = generateId(); const n = now();
            const proj = { id, name: parsed.name || file.name.replace(/\.[^.]+$/, ""), notes: parsed.notes, checklist: {}, createdAt: n, updatedAt: n };
            migrateProject(proj);
            if (!proj.subPoints) proj.subPoints = [];
            setProjects(prev => ({ ...prev, [id]: proj }));
            setCurrentProjectId(id); setActiveStep(null);
          };
          reader.readAsText(file, "UTF-8");
        };
        input.click();
      };

      const handleReset = () => {
        if (!currentProjectId || !confirm("このプロジェクトのメモを全てクリアしますか？")) return;
        setProjects(prev => ({ ...prev, [currentProjectId]: touch({ ...prev[currentProjectId], notes: {}, subPoints: [], checklist: {} }) }));
        setActiveStep(null);
      };

      // AI prompt
      const generateAIPrompt = (stepKey) => {
        const pName = projectName || "無題のプロジェクト";
        let prompt = `あなたは高松智史氏の仕事術「ロサTス作ア」フレームワークの専門家です。\n\n`;
        prompt += `【プロジェクト】${pName}\n\n【現在のメモ内容】\n`;
        prompt += `[ロ] 論点: ${notes["ロ"]?.trim() || "（未記入）"}\n\n`;
        if (subPoints.length > 0) {
          subPoints.forEach((sp, i) => {
            prompt += `[サブ論点${i + 1}] ${sp.content || "（未記入）"}\n`;
            if (sp.tasks && sp.tasks.length > 0) {
              sp.tasks.forEach((tk, j) => {
                prompt += `  [TASK${sp.tasks.length > 1 ? ` ${j + 1}` : ""}] ${tk.content || "（未記入）"}`;
                if (tk.schedule?.trim()) prompt += ` [スケジュール: ${tk.schedule}]`;
                prompt += `\n`;
              });
            } else { prompt += `  [TASK] （未記入）\n`; }
          });
        } else { prompt += `[サブ論点] （未記入）\n`; }
        prompt += `\n[作] 作業: ${notes["作"]?.trim() || "（未記入）"}\n`;
        prompt += `[ア] アウトプット: ${notes["ア"]?.trim() || "（未記入）"}\n`;
        prompt += `\n【相談したいこと】\n${AI_PROMPTS[stepKey]}`;
        return prompt;
      };
      const handleAICopy = async (stepKey) => {
        const prompt = generateAIPrompt(stepKey);
        try { await navigator.clipboard.writeText(prompt); } catch { const ta = document.createElement("textarea"); ta.value = prompt; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); }
        setCopiedStep(stepKey); setTimeout(() => setCopiedStep(null), 2500);
      };

      // Map flow circle clicks: サ, T, ス → "サ"
      const handleFlowClick = (key) => {
        const target = (key === "T" || key === "ス") ? "サ" : key;
        setActiveStep(activeStep === target ? null : target);
        setViewMode("single");
      };

      // Render simple note card (ロ, 作, ア)
      const renderNoteCard = (step, prevKey, nextKey) => {
        const isActive = activeStep === step.key;
        const meta = C[step.key];
        const hasContent = notes[step.key]?.trim();
        return (
          <div key={step.key} className={`card${isActive ? " active" : ""}`}
            style={{ borderColor: isActive ? meta.color + "66" : undefined, boxShadow: isActive ? `0 4px 24px ${meta.color}11` : "none" }}>
            <button className="card-header" onClick={() => setActiveStep(isActive ? null : step.key)}>
              <div className="card-key" style={{ color: meta.color, textShadow: isActive ? `0 0 12px ${meta.color}44` : "none" }}>{step.key}</div>
              <div style={{ flex: 1 }}><div className="card-label">{step.label}</div><div className="card-question">{step.question}</div></div>
              <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                {hasContent && <div className="filled-dot" style={{ background: meta.color }} />}
                <span className={`card-chevron${isActive ? " open" : ""}`}>▾</span>
              </div>
            </button>
            {isActive && (
              <div className="card-body">
                {meta.hint && (
                  <div className="card-hint" style={{ background: `${meta.color}0a`, border: `1px solid ${meta.color}22` }}>
                    <div className="card-hint-text">{meta.hint}</div>
                    <div className="card-hint-example mono" style={{ color: meta.color }}>{meta.example}</div>
                  </div>
                )}
                <textarea className="card-textarea" style={{ border: `1px solid ${meta.color}33` }}
                  value={notes[step.key] || ""} onChange={e => updateNote(step.key, e.target.value)}
                  placeholder={`${meta.label}をメモ...`} autoFocus />
                <button className={`ai-btn${copiedStep === step.key ? " copied" : ""}`} onClick={() => handleAICopy(step.key)}>
                  {copiedStep === step.key ? "✓ コピーしました！claude.ai に貼り付けてください" : "🤖 AIに相談（プロンプトをコピー）"}
                </button>
                <div className="card-nav">
                  {prevKey ? <button className="nav-btn nav-btn-prev" onClick={() => setActiveStep(prevKey)}>← {prevKey}</button> : <div />}
                  {nextKey && <button className="nav-btn" onClick={() => setActiveStep(nextKey)} style={{ background: `${C[nextKey].color}22`, border: `1px solid ${C[nextKey].color}44`, color: C[nextKey].color }}>{nextKey} →</button>}
                </div>
              </div>
            )}
          </div>
        );
      };

      // Render サブ論点 combined card
      const renderSubPointCard = () => {
        const isActive = activeStep === "サ";
        const anyFilled = subPoints.some(sp => sp.content?.trim() || sp.tasks?.some(tk => tk.content?.trim()));
        return (
          <div className={`card${isActive ? " active" : ""}`}
            style={{ borderColor: isActive ? C["サ"].color + "66" : undefined, boxShadow: isActive ? `0 4px 24px ${C["サ"].color}11` : "none" }}>
            <button className="card-header" onClick={() => setActiveStep(isActive ? null : "サ")}>
              <div style={{ display: "flex", gap: "2px" }}>
                {["サ", "T", "ス"].map(k => (
                  <span key={k} className="card-key" style={{ color: C[k].color, fontSize: "18px", minWidth: "auto" }}>{k}</span>
                ))}
              </div>
              <div style={{ flex: 1 }}>
                <div className="card-label">サブ論点 → TASK → スケジュール</div>
                <div className="card-question">論点を分解し、各サブ論点に作業と期限を紐づける</div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                {anyFilled && <div className="filled-dot" style={{ background: C["サ"].color }} />}
                <span className={`card-chevron${isActive ? " open" : ""}`}>▾</span>
              </div>
            </button>
            {isActive && (
              <div className="card-body">
                <div className="card-hint" style={{ background: `${C["サ"].color}0a`, border: `1px solid ${C["サ"].color}22` }}>
                  <div className="card-hint-text">論点を解くための「問い」に分解し、それぞれにTASKとスケジュールを紐づける{"\n"}3〜5個がベスト</div>
                  <div className="card-hint-example mono" style={{ color: C["サ"].color }}>例：市場規模は？→ 業界レポート分析 → Day1-2</div>
                </div>

                {subPoints.map((sp, i) => (
                  <div key={sp.id} className="sp-card">
                    <div className="sp-card-header">
                      <span className="sp-card-num" style={{ color: C["サ"].color }}>サブ論点 {i + 1}</span>
                      {subPoints.length > 1 && (
                        <button className="sp-remove" onClick={() => removeSubPoint(sp.id)} title="削除">✕</button>
                      )}
                    </div>
                    <div className="sp-field-label" style={{ color: C["サ"].color, marginTop: 0 }}>
                      <span className="sp-field-dot" style={{ background: C["サ"].color }} />サブ論点
                    </div>
                    <textarea className="sp-input" style={{ border: `1px solid ${C["サ"].color}33`, minHeight: "50px" }}
                      value={sp.content} onChange={e => updateSubPoint(sp.id, "content", e.target.value)}
                      placeholder="サブ論点を入力..." />

                    <div className="sp-field-label" style={{ color: C["T"].color }}>
                      <span className="sp-field-dot" style={{ background: C["T"].color }} />TASK
                    </div>
                    {(sp.tasks || []).map((tk, j) => (
                      <div key={tk.id} style={{ display: "flex", gap: "6px", alignItems: "flex-start", marginBottom: "6px" }}>
                        <div style={{ flex: 2 }}>
                          <input className="sp-input" style={{ border: `1px solid ${C["T"].color}33` }}
                            value={tk.content} onChange={e => updateTask(sp.id, tk.id, "content", e.target.value)}
                            placeholder={`TASK${(sp.tasks || []).length > 1 ? ` ${j + 1}` : ""}...`} />
                        </div>
                        <div style={{ flex: 1 }}>
                          <input className="sp-input" style={{ border: `1px solid ${C["ス"].color}33`, fontSize: "12px" }}
                            value={tk.schedule} onChange={e => updateTask(sp.id, tk.id, "schedule", e.target.value)}
                            placeholder="📅 期限..." />
                        </div>
                        {(sp.tasks || []).length > 1 && (
                          <button className="sp-remove" style={{ marginTop: "6px", fontSize: "13px" }}
                            onClick={() => removeTask(sp.id, tk.id)} title="このTASKを削除">✕</button>
                        )}
                      </div>
                    ))}
                    <button onClick={() => addTask(sp.id)}
                      style={{ background: "none", border: `1px dashed ${C["T"].color}44`, color: C["T"].color, padding: "4px 10px", borderRadius: "4px", fontSize: "11px", cursor: "pointer", opacity: 0.7 }}>
                      + TASK追加
                    </button>
                  </div>
                ))}

                <button className="sp-add-btn" onClick={addSubPoint}>+ サブ論点を追加</button>

                <button className={`ai-btn${copiedStep === "サ" ? " copied" : ""}`} onClick={() => handleAICopy("サ")}>
                  {copiedStep === "サ" ? "✓ コピーしました！claude.ai に貼り付けてください" : "🤖 AIに相談（プロンプトをコピー）"}
                </button>
                <div className="card-nav">
                  <button className="nav-btn nav-btn-prev" onClick={() => setActiveStep("ロ")}>← ロ</button>
                  <button className="nav-btn" onClick={() => setActiveStep("作")} style={{ background: `${C["作"].color}22`, border: `1px solid ${C["作"].color}44`, color: C["作"].color }}>作 →</button>
                </div>
              </div>
            )}
          </div>
        );
      };

      return (
        <div>
          {/* Header */}
          <div className="header">
            <div className="header-top">
              <div>
                <div className="header-subtitle mono">高松智史式</div>
                <div className="header-title">
                  {FLOW_KEYS.map(k => <span key={k} style={{ color: C[k].color, textShadow: `0 0 20px ${C[k].color}33` }}>{k}</span>)}
                </div>
              </div>
              <div style={{ display: "flex", gap: "6px", flexWrap: "wrap", alignItems: "center" }}>
                <button className="btn-theme" onClick={toggleTheme} title={theme === "dark" ? "ライトモードに切替" : "ダークモードに切替"}>{theme === "dark" ? "☀️" : "🌙"}</button>
                <button className="btn" onClick={handleImport}>📥 Import</button>
                <div className="export-menu-wrapper">
                  <button className="btn" onClick={() => setShowExportMenu(!showExportMenu)}>📋 Export ▾</button>
                  {showExportMenu && <div className="export-menu"><button onClick={() => handleExport("txt")}>📄 テキスト (.txt)</button><button onClick={() => handleExport("md")}>📝 Markdown (.md)</button></div>}
                </div>
                <button className="btn btn-muted" onClick={handleReset}>↺ Reset</button>
              </div>
            </div>
            <div className="project-bar">
              <button className="btn btn-new" onClick={() => setShowTemplateModal(true)}>+ 新規</button>
              <select className="project-select" value={currentProjectId || ""} onChange={e => switchProject(e.target.value)}>
                {projectList.map(p => <option key={p.id} value={p.id}>{p.name || "無題のプロジェクト"}</option>)}
              </select>
              <button className="btn btn-delete" onClick={deleteProject}>🗑</button>
            </div>
            <input className="project-input" value={projectName} onChange={e => updateProjectName(e.target.value)} placeholder="プロジェクト名をメモ..." />
            <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
              <div className="progress-bar"><div className="progress-fill" style={{ width: `${progress}%` }} /></div>
              <span className="mono" style={{ fontSize: "11px", color: "var(--text-faint)", whiteSpace: "nowrap" }}>{filledCount}/6</span>
            </div>
            {cur?.updatedAt && <div className="timestamp">最終更新: {new Date(cur.updatedAt).toLocaleString("ja-JP")}</div>}
          </div>

          {/* Tip */}
          {showTip && (
            <div className="tip-banner">
              <div><strong>💡 核心：</strong>いきなりTASKに飛ばない。<br />「ロ→サ」= 論点とサブ論点を先に立てるだけで、仕事の質が激変する。<br />最後は必ず<strong> →D（ディスカッション）</strong>で上司と議論してプロセスを閉じる。</div>
              <button className="tip-close" onClick={() => setShowTip(false)}>✕</button>
            </div>
          )}

          {/* Flow circles */}
          <div className="flow-row">
            {FLOW_KEYS.map((k, i) => (
              <div key={k} style={{ display: "flex", alignItems: "center", gap: "4px" }}>
                <button className="flow-circle" onClick={() => handleFlowClick(k)}
                  style={{
                    borderColor: (activeStep === k || (activeStep === "サ" && (k === "サ" || k === "T" || k === "ス"))) ? C[k].color : (flowFilled[k] ? C[k].color + "88" : undefined),
                    background: (activeStep === k || (activeStep === "サ" && (k === "サ" || k === "T" || k === "ス"))) ? `${C[k].color}22` : (flowFilled[k] ? "var(--flow-circle-filled)" : undefined),
                    color: flowFilled[k] ? C[k].color : ((activeStep === k || (activeStep === "サ" && (k === "サ" || k === "T" || k === "ス"))) ? C[k].color : undefined),
                    boxShadow: (activeStep === k || (activeStep === "サ" && (k === "サ" || k === "T" || k === "ス"))) ? `0 0 16px ${C[k].color}33` : "none",
                  }}>
                  {k}
                  {flowFilled[k] && <span className="dot" style={{ background: C[k].color }} />}
                </button>
                {i < FLOW_KEYS.length - 1 && <span className="mono" style={{ color: "var(--flow-arrow)", fontSize: "14px" }}>→</span>}
              </div>
            ))}
            <span className="mono" style={{ color: "var(--flow-arrow)", fontSize: "14px", marginLeft: "4px" }}>→</span>
            <div className="flow-d">D</div>
          </div>
          <div className="flow-hint mono">タップして展開 → メモを記入</div>

          <div className="view-toggle-bar">
            {[["single", "個別"], ["overview", "一覧"], ["tree", "ツリー"]].map(([m, l]) => (
              <button key={m} className={`view-btn${viewMode === m ? " active" : ""}`} onClick={() => setViewMode(m)}>{l}</button>
            ))}
          </div>

          {/* ===== SINGLE MODE ===== */}
          {viewMode === "single" && (
            <div className="cards">
              {renderNoteCard(MAIN_STEPS[0], null, "サ")}
              {renderSubPointCard()}
              {renderNoteCard(MAIN_STEPS[2], "サ", "ア")}
              {renderNoteCard(MAIN_STEPS[3], "作", null)}

              <div className="warning-card">
                <div className="warning-title">⚠ TASKバカ注意報</div>
                <div className="warning-body">
                  いきなり「T（TASK）」から始めていないか？<br /><span style={{ color: "#E8443A" }}>ロ→サ</span> を飛ばすと、論点がズレた作業を大量にこなす「TASKバカ」になる。<br /><strong style={{ color: "#c8a860" }}>まず論点。常に論点に立ち返る。</strong>
                </div>
              </div>
              <div className="checklist-card">
                <div className="checklist-title">🔍 セルフチェック</div>
                {CHECKLIST.map((q, i) => (
                  <div key={i} className="checklist-item" onClick={() => toggleChecklist(i)}>
                    <span className="checklist-box" style={{ color: checklist[i] ? "#7B68EE" : "var(--text-very-faint)" }}>{checklist[i] ? "☑" : "☐"}</span>
                    <span style={{ textDecoration: checklist[i] ? "line-through" : "none", color: checklist[i] ? "var(--text-very-faint)" : "var(--text-muted)" }}>{q}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ===== OVERVIEW MODE ===== */}
          {viewMode === "overview" && (
            <div className="overview-container">
              <div className="overview-section">
                <div className="overview-section-title"><span style={{ color: C["ロ"].color, fontWeight: 900, fontSize: 18 }}>ロ</span> 論点</div>
                <textarea className="card-textarea" style={{ border: `1px solid ${C["ロ"].color}33`, minHeight: "60px" }}
                  value={notes["ロ"] || ""} onChange={e => updateNote("ロ", e.target.value)} placeholder="論点をメモ..." />
              </div>

              <div className="overview-section">
                <div className="overview-section-title">
                  <span style={{ color: C["サ"].color, fontWeight: 900, fontSize: 18 }}>サ</span>
                  <span style={{ color: C["T"].color, fontWeight: 900, fontSize: 18 }}>T</span>
                  <span style={{ color: C["ス"].color, fontWeight: 900, fontSize: 18 }}>ス</span>
                  サブ論点 → TASK → スケジュール
                </div>
                {subPoints.map((sp, i) => (
                  <div key={sp.id} style={{ marginBottom: 8 }}>
                    <div className="overview-sp-row" style={{ gridTemplateColumns: "1fr 2fr" }}>
                      <div className="overview-sp-cell" style={{ borderLeft: `3px solid ${C["サ"].color}` }}>
                        <div className="overview-sp-label" style={{ color: C["サ"].color }}>サブ論点 {i + 1}</div>
                        <textarea className="sp-input" style={{ border: `1px solid ${C["サ"].color}22`, minHeight: "50px" }}
                          value={sp.content} onChange={e => updateSubPoint(sp.id, "content", e.target.value)} placeholder="サブ論点..." />
                      </div>
                      <div className="overview-sp-cell" style={{ borderLeft: `3px solid ${C["T"].color}` }}>
                        <div className="overview-sp-label" style={{ color: C["T"].color }}>TASK → スケジュール</div>
                        {(sp.tasks || []).map((tk, j) => (
                          <div key={tk.id} style={{ display: "flex", gap: 4, marginBottom: 4, alignItems: "center" }}>
                            <input className="sp-input" style={{ border: `1px solid ${C["T"].color}22`, flex: 2 }}
                              value={tk.content} onChange={e => updateTask(sp.id, tk.id, "content", e.target.value)} placeholder="TASK..." />
                            <input className="sp-input" style={{ border: `1px solid ${C["ス"].color}22`, flex: 1, fontSize: 12 }}
                              value={tk.schedule} onChange={e => updateTask(sp.id, tk.id, "schedule", e.target.value)} placeholder="期限..." />
                          </div>
                        ))}
                        <button onClick={() => addTask(sp.id)} style={{ background: "none", border: "none", color: C["T"].color, fontSize: 11, cursor: "pointer", padding: "2px 0", opacity: 0.7 }}>+ TASK追加</button>
                      </div>
                    </div>
                  </div>
                ))}
                <button className="sp-add-btn" onClick={addSubPoint} style={{ marginTop: 4 }}>+ サブ論点を追加</button>
              </div>

              {["作", "ア"].map(k => (
                <div key={k} className="overview-section">
                  <div className="overview-section-title"><span style={{ color: C[k].color, fontWeight: 900, fontSize: 18 }}>{k}</span> {C[k].label}</div>
                  <textarea className="card-textarea" style={{ border: `1px solid ${C[k].color}33`, minHeight: "60px" }}
                    value={notes[k] || ""} onChange={e => updateNote(k, e.target.value)} placeholder={`${C[k].label}をメモ...`} />
                </div>
              ))}
            </div>
          )}

          {/* ===== TREE MODE ===== */}
          {viewMode === "tree" && (() => {
            const ronten = notes["ロ"]?.trim() || "";
            const hasData = ronten || subPoints.length > 0;
            return (
              <div className="tree-container">
                {!hasData && <div className="tree-empty">ロ（論点）とサ（サブ論点）にメモを入力すると、ここにツリーが表示されます。</div>}
                {hasData && (
                  <div>
                    <div className="tree-root-label"
                      style={{ background: `${C["ロ"].color}18`, color: C["ロ"].color, border: `1px solid ${C["ロ"].color}33` }}
                      onClick={() => { setViewMode("single"); setActiveStep("ロ"); }}>
                      🎯 {ronten || "（論点を入力してください）"}
                    </div>
                    {subPoints.length > 0 ? (
                      <div className="tree-branch">
                        {subPoints.map((sp, i) => (
                          <div key={sp.id} className="tree-node">
                            <div className="tree-node-label"
                              style={{ background: `${C["サ"].color}15`, color: C["サ"].color, border: `1px solid ${C["サ"].color}22` }}
                              onClick={() => { setViewMode("single"); setActiveStep("サ"); }}>
                              {sp.content || `（サブ論点 ${i + 1}）`}
                            </div>
                            {sp.tasks && sp.tasks.some(tk => tk.content?.trim() || tk.schedule?.trim()) && (
                              <div className="tree-sub-branch">
                                {sp.tasks.filter(tk => tk.content?.trim() || tk.schedule?.trim()).map(tk => (
                                  <div key={tk.id} className="tree-node">
                                    <div className="tree-node-label" style={{ background: `${C["T"].color}12`, color: C["T"].color, border: `1px solid ${C["T"].color}22`, fontSize: "12px" }}>
                                      📋 {tk.content || "（TASK未記入）"}
                                      {tk.schedule?.trim() && <span style={{ color: C["ス"].color, marginLeft: 8, fontSize: "11px" }}>📅 {tk.schedule}</span>}
                                    </div>
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        ))}
                      </div>
                    ) : <div className="tree-empty">サブ論点を追加するとここに分岐が表示されます</div>}
                  </div>
                )}
                <div className="warning-card" style={{ marginTop: 24 }}>
                  <div className="warning-title">⚠ TASKバカ注意報</div>
                  <div className="warning-body">いきなり「T（TASK）」から始めていないか？<br /><span style={{ color: "#E8443A" }}>ロ→サ</span> を飛ばすと、TASKバカになる。<br /><strong style={{ color: "#c8a860" }}>まず論点。常に論点に立ち返る。</strong></div>
                </div>
              </div>
            );
          })()}

          {/* Template modal */}
          {showTemplateModal && (
            <div className="modal-overlay" onClick={() => setShowTemplateModal(false)}>
              <div className="modal" onClick={e => e.stopPropagation()}>
                <div className="modal-title">新規プロジェクト</div>
                <div style={{ fontSize: "12px", color: "var(--text-muted)", marginBottom: "16px" }}>テンプレートを選んでください</div>
                {TEMPLATES.map((t, i) => (
                  <button key={i} className="template-btn" onClick={() => createProjectFromTemplate(t)}>
                    <div className="template-btn-name">{t.name}</div><div className="template-btn-desc">{t.desc}</div>
                  </button>
                ))}
                <button className="btn btn-muted" style={{ width: "100%", marginTop: "8px" }} onClick={() => setShowTemplateModal(false)}>キャンセル</button>
              </div>
            </div>
          )}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
